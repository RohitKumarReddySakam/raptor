rules:
  - id: GUARD-P001
    name: "Registry Run Key Persistence"
    description: "Detects writes to common autorun registry keys"
    severity: HIGH
    mitre_tactic: "Persistence"
    mitre_technique: "T1547.001"
    conditions:
      file_path_contains: ["HKEY_CURRENT_USER\\Software\\Microsoft\\Windows\\CurrentVersion\\Run",
                           "HKEY_LOCAL_MACHINE\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run"]

  - id: GUARD-P002
    name: "Startup Folder Modification"
    description: "File written to Windows startup folder"
    severity: HIGH
    mitre_tactic: "Persistence"
    mitre_technique: "T1547.001"
    conditions:
      file_path_contains: ["\\AppData\\Roaming\\Microsoft\\Windows\\Start Menu\\Programs\\Startup",
                           "\\ProgramData\\Microsoft\\Windows\\Start Menu\\Programs\\Startup"]

  - id: GUARD-P003
    name: "Scheduled Task Creation"
    description: "schtasks.exe or at.exe used to create scheduled task"
    severity: MEDIUM
    mitre_tactic: "Persistence"
    mitre_technique: "T1053.005"
    conditions:
      process_name: ["schtasks.exe", "at.exe"]
      cmdline_contains: ["/create", "-create"]

  - id: GUARD-P004
    name: "Cron Job Modification"
    description: "Crontab modification detected"
    severity: MEDIUM
    mitre_tactic: "Persistence"
    mitre_technique: "T1053.003"
    conditions:
      process_name: ["crontab"]
      cmdline_contains: ["-e", "-l"]

  - id: GUARD-P005
    name: "SSH Authorized Keys Modified"
    description: "SSH authorized_keys file was modified"
    severity: HIGH
    mitre_tactic: "Persistence"
    mitre_technique: "T1098.004"
    conditions:
      file_path_contains: [".ssh/authorized_keys", "/.ssh/authorized_keys"]
